<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Anatomy Atlas — 3D Human Anatomy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=36" />
</head>
<body>
  <!-- ============================ HEADER ============================ -->
  <header class="topbar">
    <button class="nav-toggle" id="nav-toggle" aria-label="Open menu">☰</button>
    <div class="brand">
      <span class="brand-mark">⚕</span>
      <span class="brand-name">Anatomy&nbsp;Atlas</span>
      <span class="brand-sub" id="structure-total"></span>
    </div>
    <div class="topbar-right">
      <span class="glb-status" id="glb-status"></span>
    </div>
  </header>

  <div class="layout">
    <!-- ========================== SIDEBAR ========================== -->
    <aside class="sidebar">
      <div class="search-wrap">
        <input id="search" type="text" placeholder="Search structures…  (e.g. femur, heart)" autocomplete="off" />
        <button id="search-clear" title="Clear" style="display:none">×</button>
      </div>
      <div class="tree-mode" id="tree-mode" role="tablist" aria-label="Browse by">
        <button data-mode="system" class="on" role="tab" aria-selected="true">By system</button>
        <button data-mode="region" role="tab" aria-selected="false">By region</button>
      </div>
      <div id="quicklists"></div>
      <div class="tree" id="tree" role="tree" aria-label="Anatomy structures"></div>
    </aside>

    <!-- ========================== VIEWPORT ========================= -->
    <main class="viewport" id="viewport">
      <div class="loading hidden" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Loading…</div>
      </div>
      <div class="floating-label" id="floating-label" style="display:none"></div>

      <!-- Anatomical view cube: standard orientation presets -->
      <div class="view-cube" id="view-cube" role="group" aria-label="Camera views">
        <button data-view="reset" class="vc-recenter" title="Re-center / reset view" aria-label="Re-center">⌖</button>
        <button data-view="ant" title="Anterior (front)">ANT</button>
        <button data-view="pos" title="Posterior (back)">POS</button>
        <button data-view="lat" title="Lateral (side)">LAT</button>
        <button data-view="med" title="Medial">MED</button>
        <button data-view="sup" title="Superior (top)">SUP</button>
        <button data-view="inf" title="Inferior (bottom)">INF</button>
      </div>

      <div class="isolate-banner" id="isolate-banner" style="display:none">
        <span>Isolated: <strong id="isolate-name"></strong></span>
        <button class="btn tiny" id="isolate-exit">Exit</button>
      </div>

      <!-- One consolidated control bar: system layers · X-ray · view actions -->
      <div class="toolbar-bar" id="toolbar-bar">
        <div class="tb-group" id="layers"></div>
        <div class="tb-sep"></div>
        <div class="tb-group tb-xray">
          <span class="tb-label">X-ray</span>
          <input type="range" id="xray-slider" min="0" max="90" value="0" />
        </div>
        <div class="tb-sep"></div>
        <div class="tb-group tb-actions">
          <label class="chk"><input type="checkbox" id="toggle-labels" checked /><span>Labels</span></label>
          <button class="btn ghost" id="btn-reset">Reset</button>
          <button class="btn ghost" id="btn-show-all">Show all</button>
          <label class="btn ghost file-btn">Load GLB…<input type="file" id="glb-file" accept=".glb,.gltf" hidden /></label>
        </div>
      </div>
    </main>

    <!-- ======================== INFO PANEL ========================= -->
    <aside class="infopanel" aria-label="Structure details">
      <button class="panel-close" id="info-close" aria-label="Close details">×</button>
      <div id="info-content" class="info-empty">
        <p>Select a structure to see details.</p>
      </div>
    </aside>

    <div class="scrim" id="scrim"></div>
  </div>
  <div id="live" class="sr-only" aria-live="polite"></div>

  <!-- Three.js r128 + classic-global OrbitControls & GLTFLoader (run from file://) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <!-- Draco decoder: lets GLTFLoader read Draco-compressed .glb models -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
  <script>
  /* Auto-attach a shared Draco decoder to every GLTFLoader instance.
     Backward-compatible: uncompressed GLBs still load normally. */
  (function(){
    if (typeof THREE==="undefined" || !THREE.GLTFLoader || !THREE.DRACOLoader) return;
    var draco = new THREE.DRACOLoader();
    draco.setDecoderPath("https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/");
    var Orig = THREE.GLTFLoader;
    function Patched(manager){ var inst = new Orig(manager); inst.setDRACOLoader(draco); return inst; }
    Patched.prototype = Orig.prototype;
    THREE.GLTFLoader = Patched;
  })();
  </script>
  <!-- Premium viewport: IBL environment + post-processing (outline selection) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/environments/RoomEnvironment.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/OutlinePass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/FXAAShader.js"></script>
  <!-- Fuzzy search -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>

  <!-- App -->
  <script src="js/data.js?v=36"></script>
  <script src="js/body-model.js?v=36"></script>
  <script src="js/glb-loader.js?v=36"></script>
  <!-- Sculpted head overlay (Lee Perry-Smith, CC-BY 3.0). Wraps AnatomyGLB.load so
       that when the skeleton finishes loading we parent a real sculpted head into
       its group (shared coordinate space). Tunable constants below. -->
  <script>
  (function(){
    var HEAD = {
      url: "https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/models/gltf/LeePerrySmith/LeePerrySmith.glb",
      scale: 0.030,            // size relative to skeleton native units
      pos: [0.0, 1.580, 0.040],// x,y,z in skeleton native coords (skull ~y1.48-1.705)
      rotY: 0.0,               // yaw (radians); flip to Math.PI if facing backward
      color: 0xddae9c          // skin tone applied over the model's normal map
    };
    if (!window.AnatomyGLB || typeof THREE === "undefined" || !THREE.GLTFLoader) return;
    var origLoad = window.AnatomyGLB.load;
    window.AnatomyGLB.load = function(url, opts){
      var p = origLoad.call(this, url, opts);
      if (opts && opts.systemId === "skeletal") {
        p.then(function(loaded){
          try {
            var gl = new THREE.GLTFLoader();
            gl.load(HEAD.url, function(gltf){
              var head = gltf.scene || (gltf.scenes && gltf.scenes[0]);
              if (!head) return;
              head.scale.setScalar(HEAD.scale);
              head.position.set(HEAD.pos[0], HEAD.pos[1], HEAD.pos[2]);
              head.rotation.y = HEAD.rotY;
              head.traverse(function(o){
                if (o.isMesh && o.material){
                  o.material = o.material.clone();
                  if (o.material.color) o.material.color.setHex(HEAD.color);
                  if ("roughness" in o.material) o.material.roughness = 0.72;
                  if ("metalness" in o.material) o.material.metalness = 0.0;
                }
              });
              head.name = "SculptedHead";
              loaded.group.add(head);
              window.__head = head; // handle for live tuning in the console
            });
          } catch(e){ console.warn("head overlay failed", e); }
        });
      }
      return p;
    };
  })();
  </script>
  <script src="js/app.js?v=36"></script>
</body>
</html>
